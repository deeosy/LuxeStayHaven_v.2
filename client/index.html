	<script src="https://payment-wrapper.liteapi.travel/dist/liteAPIPayment.js?a=11"></script>
	<script>
		function initializePaymentForm(clientSecret, prebookId, transactionId, guestFirstName, guestLastName, guestEmail, environment) {
			const publicKey = environment === "sandbox" ? "sandbox" : "live";

			console.log("initializePaymentForm", publicKey);
			liteAPIConfig = {
				publicKey: publicKey,

				appearance: {
					theme: "flat",
				},
				options: {
					business: {
						name: "LiteAPI",
					},
				},
				targetElement: "#pe",
				/* amount: 150,
			currency: "EUR", */
				secretKey: `${clientSecret}`,
				returnUrl: `${window.location.origin}/checkout/?prebookId=${prebookId}&transactionId=${transactionId}&guestFirstName=${encodeURIComponent(guestFirstName)}&guestLastName=${encodeURIComponent(guestLastName)}&guestEmail=${encodeURIComponent(guestEmail)}&environment=${encodeURIComponent(environment)}`,
			};
			liteAPIPayment = new LiteAPIPayment(liteAPIConfig);
			liteAPIPayment.handlePayment();
		}
	</script>
</head>
